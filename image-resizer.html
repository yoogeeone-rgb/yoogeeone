<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>이미지 리사이저</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f0ede8; --surface: #fff; --surface2: #f7f5f2;
  --border: rgba(0,0,0,0.1); --border-md: rgba(0,0,0,0.18);
  --text: #1a1a18; --muted: #7a7a76;
  --radius: 14px; --rsm: 9px;
  --accent: #1a1a18; --accent-fg: #fff;
  --tag: #e8e5e0; --done-bg: #e6f2eb; --done: #1e6b38;
  --err-bg: #fce8e8; --err: #b03030;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --surface: #272725; --surface2: #1e1e1c;
    --border: rgba(255,255,255,0.08); --border-md: rgba(255,255,255,0.16);
    --text: #eeebe4; --muted: #888884;
    --accent: #eeebe4; --accent-fg: #1c1c1a;
    --tag: #333330; --done-bg: #1a3326; --done: #5ec97e;
    --err-bg: #3a1e1e; --err: #f07070;
  }
}
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  font-size: 15px; line-height: 1.5;
  min-height: 100vh; padding: 3rem 1.5rem 6rem;
  display: flex; justify-content: center;
}
.wrap { width: 100%; max-width: 840px; }

/* Drop */
#drop {
  border: 1.5px dashed var(--border-md); border-radius: var(--radius);
  padding: 2.5rem 1rem; text-align: center; cursor: pointer;
  transition: background .15s, border-color .15s; margin-bottom: 1.5rem;
  user-select: none;
}
#drop:hover, #drop.over { background: var(--surface); border-color: var(--muted); }
#drop svg { display: block; margin: 0 auto .75rem; opacity: .35; }
#drop p { font-size: 15px; font-weight: 500; }
#drop small { font-size: 13px; color: var(--muted); margin-top: .2rem; display: block; }

/* Layout */
.layout { display: grid; grid-template-columns: 1fr 296px; gap: 1.25rem; align-items: start; }
@media (max-width: 640px) { .layout { grid-template-columns: 1fr; } }

/* Card */
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
.card + .card { margin-top: 1.25rem; }
.ctitle { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }

/* Form */
.field { margin-bottom: .9rem; }
.field:last-child { margin-bottom: 0; }
.field > label { display: block; font-size: 12px; color: var(--muted); font-weight: 500; margin-bottom: .35rem; }
input[type=number], input[type=text], select {
  width: 100%; padding: .48rem .7rem;
  border: 0.5px solid var(--border-md); border-radius: var(--rsm);
  background: var(--surface2); color: var(--text);
  font-size: 14px; font-family: inherit; outline: none;
  transition: border-color .15s; -moz-appearance: textfield;
}
input[type=number]:focus, input[type=text]:focus, select:focus { border-color: var(--muted); }
input[type=number]::-webkit-inner-spin-button { display: none; }
select { cursor: pointer; }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

.dim-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: .4rem; }
.dim-row span { text-align: center; font-size: 13px; color: var(--muted); }
.lock-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .9rem; font-size: 13px; color: var(--muted); }
.lock-row input { cursor: pointer; accent-color: var(--accent); }

/* Mode / DPI buttons */
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .4rem; margin-bottom: .85rem; }
.tbtn {
  padding: .5rem .4rem; border: 0.5px solid var(--border-md); border-radius: var(--rsm);
  background: var(--surface2); color: var(--text);
  font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
  text-align: center; line-height: 1.3; transition: background .12s;
}
.tbtn:hover { background: var(--tag); }
.tbtn.on { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
.tbtn small { font-size: 10px; opacity: .7; display: block; margin-top: 1px; font-weight: 400; }
.sep { height: 0.5px; background: var(--border); margin: 1rem 0; }

/* File list */
#list-wrap { display: none; }
#list-wrap.show { display: block; }
.list-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.list-hd span { font-size: 13px; color: var(--muted); }
.list-hd button { font-size: 12px; background: none; border: none; color: var(--muted); cursor: pointer; padding: .2rem .5rem; border-radius: 5px; font-family: inherit; }
.list-hd button:hover { color: var(--text); background: var(--tag); }
#file-list { display: flex; flex-direction: column; gap: .5rem; }
.fitem { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--rsm); padding: .7rem .9rem; display: grid; grid-template-columns: 40px 1fr auto; align-items: center; gap: .7rem; }
.fthumb { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; background: var(--surface2); }
.fname { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
.fmeta { font-size: 12px; color: var(--muted); margin-top: 1px; }
.fstatus { font-size: 11px; font-weight: 500; white-space: nowrap; padding: .2rem .55rem; border-radius: 20px; }
.fstatus.pending { background: var(--tag); color: var(--muted); }
.fstatus.processing { background: #e8f0fe; color: #1a56c4; }
.fstatus.done { background: var(--done-bg); color: var(--done); }
.fstatus.error { background: var(--err-bg); color: var(--err); }

/* Buttons */
.btn-row { display: flex; gap: .6rem; margin-top: 1.25rem; }
.btn-main {
  flex: 1; padding: .65rem; background: var(--accent); color: var(--accent-fg);
  border: none; border-radius: var(--rsm); font-size: 14px; font-weight: 600;
  font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .4rem;
  transition: opacity .15s;
}
.btn-main:hover { opacity: .8; }
.btn-main:disabled { opacity: .3; cursor: not-allowed; }
.btn-sub { padding: .65rem 1rem; background: none; border: 0.5px solid var(--border-md); border-radius: var(--rsm); color: var(--text); font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; transition: background .12s; white-space: nowrap; }
.btn-sub:hover { background: var(--tag); }
.pbar { height: 3px; background: var(--border-md); border-radius: 99px; margin-top: .9rem; overflow: hidden; display: none; }
.pbar.show { display: block; }
.pfill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .2s; }

.site-header {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  padding: 1.5rem 2rem;
  background: #1a1a18;
  border-radius: var(--radius);
  margin-bottom: 2rem;
}
.header-logo { flex-shrink: 0; }
.logo-img {
  width: 44px;
  height: 44px;
  object-fit: contain;
  object-position: center;
  display: block;
}
.header-text { display: flex; flex-direction: column; gap: .15rem; }
.header-studio {
  font-size: 15px;
  font-weight: 500;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.65);
  margin: 0;
}
.header-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -.02em;
  color: #ffffff;
  margin: 0;
  line-height: 1.1;
}
canvas { display: none; }
body.drag-over { outline: 2px dashed var(--muted); outline-offset: -8px; }
.zip-row { display: flex; align-items: center; gap: .5rem; margin-top: .5rem; }
</style>

<script>
var files = [];
var mode = 'fixed';
var dpi = 300;

var drop = document.getElementById('drop');
var fi = document.getElementById('fi');
var fi2 = document.getElementById('fi2');
var listWrap = document.getElementById('list-wrap');
var fileList = document.getElementById('file-list');
var fcnt = document.getElementById('fcnt');
var saveBtn = document.getElementById('saveBtn');
var addBtn = document.getElementById('addBtn');
var clearBtn = document.getElementById('clearBtn2');
var zipRow = document.getElementById('zipRow');
var zipChk = document.getElementById('zipChk');
var wIn = document.getElementById('wIn');
var hIn = document.getElementById('hIn');
var lockChk = document.getElementById('lockChk');
var presetSel = document.getElementById('presetSel');
var longIn = document.getElementById('longIn');
var dpiIn = document.getElementById('dpiIn');
var fmtSel = document.getElementById('fmtSel');
var qualRange = document.getElementById('qualRange');
var qualOut = document.getElementById('qualOut');
var qualNum = document.getElementById('qualNum');
var suffixIn = document.getElementById('suffixIn');
var qualWrap = document.getElementById('qualWrap');
var pbar = document.getElementById('pbar');
var pfill = document.getElementById('pfill');
var cv = document.getElementById('cv');
var ctx = cv.getContext('2d');

function fmt(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return Math.round(b/1024) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function updateCount() {
  fcnt.textContent = files.length + '개 파일';
  saveBtn.disabled = files.length === 0;
  zipRow.style.display = files.length > 1 ? 'flex' : 'none';
}

function readFile(file) {
  return new Promise(function(resolve, reject) {
    var r = new FileReader();
    r.onload = function(e) { resolve(e.target.result); };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function loadImg(src) {
  return new Promise(function(resolve, reject) {
    var img = new Image();
    img.onload = function() { resolve(img); };
    img.onerror = reject;
    img.src = src;
  });
}

function addFiles(fileArr) {
  var imgExts = /\.(jpe?g|png|webp|gif|bmp|tiff?)$/i;
  var arr = Array.from(fileArr).filter(function(f) {
    return f.type.indexOf('image/') === 0 || imgExts.test(f.name);
  });
  if (!arr.length) return;

  var chain = Promise.resolve();
  arr.forEach(function(file) {
    chain = chain.then(function() {
      return readFile(file).then(function(dataUrl) {
        return loadImg(dataUrl).then(function(img) {
          var item = document.createElement('div');
          item.className = 'fitem';

          var thumb = document.createElement('img');
          thumb.className = 'fthumb';
          thumb.src = dataUrl;

          var info = document.createElement('div');
          var nameEl = document.createElement('div');
          nameEl.className = 'fname';
          nameEl.textContent = file.name;
          var metaEl = document.createElement('div');
          metaEl.className = 'fmeta';
          metaEl.textContent = img.naturalWidth + ' × ' + img.naturalHeight + ' · ' + fmt(file.size);
          info.appendChild(nameEl);
          info.appendChild(metaEl);

          var statusEl = document.createElement('div');
          statusEl.className = 'fstatus pending';
          statusEl.textContent = '대기';

          item.appendChild(thumb);
          item.appendChild(info);
          item.appendChild(statusEl);
          fileList.appendChild(item);

          files.push({ file: file, img: img, statusEl: statusEl });

          if (files.length === 1 && !wIn.value) {
            wIn.value = img.naturalWidth;
            hIn.value = img.naturalHeight;
          }
        });
      });
    });
  });

  chain.then(function() {
    listWrap.classList.add('show');
    updateCount();
  });
}

// Drop zone
// 드롭 처리
function handleDrop(e) {
  e.preventDefault();
  drop.classList.remove('over');
  document.body.classList.remove('drag-over');
  if (e.dataTransfer.files && e.dataTransfer.files.length) {
    addFiles(e.dataTransfer.files);
  }
}

drop.addEventListener('click', function() { fi.click(); });
drop.addEventListener('dragover', function(e) { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', function(e) { if (!drop.contains(e.relatedTarget)) drop.classList.remove('over'); });
drop.addEventListener('drop', handleDrop);

document.addEventListener('dragover', function(e) { e.preventDefault(); document.body.classList.add('drag-over'); });
document.addEventListener('dragleave', function(e) { if (!e.relatedTarget) document.body.classList.remove('drag-over'); });
document.addEventListener('drop', function(e) {
  if (drop.contains(e.target)) return;
  handleDrop(e);
});
fi.addEventListener('change', function(e) { addFiles(e.target.files); fi.value = ''; });
addBtn.addEventListener('click', function() { fi2.click(); });
fi2.addEventListener('change', function(e) { addFiles(e.target.files); fi2.value = ''; });
var fi3 = document.getElementById('fi3');
fi3.addEventListener('change', function(e) { addFiles(e.target.files); fi3.value = ''; });

clearBtn.addEventListener('click', function() {
  files = [];
  fileList.innerHTML = '';
  listWrap.classList.remove('show');
  wIn.value = ''; hIn.value = '';
  pbar.classList.remove('show');
  pfill.style.width = '0%';
  updateCount();
});

// Mode buttons
document.querySelectorAll('[data-mode]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('[data-mode]').forEach(function(b) { b.classList.remove('on'); });
    btn.classList.add('on');
    mode = btn.dataset.mode;
    document.getElementById('fixed-ui').style.display = mode === 'fixed' ? '' : 'none';
    document.getElementById('longfit-ui').style.display = mode === 'longfit' ? '' : 'none';
  });
});

// DPI buttons
document.querySelectorAll('[data-dpi]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('[data-dpi]').forEach(function(b) { b.classList.remove('on'); });
    btn.classList.add('on');
    dpi = parseInt(btn.dataset.dpi);
    dpiIn.value = dpi;
  });
});
dpiIn.addEventListener('input', function() {
  dpi = parseInt(dpiIn.value) || 72;
  document.querySelectorAll('[data-dpi]').forEach(function(b) {
    b.classList.toggle('on', parseInt(b.dataset.dpi) === dpi);
  });
});

// Dimension sync
wIn.addEventListener('input', function() {
  if (lockChk.checked && files.length) {
    var r = files[0].img.naturalWidth / files[0].img.naturalHeight;
    hIn.value = Math.round(parseInt(wIn.value) / r) || '';
  }
  presetSel.value = '';
});
hIn.addEventListener('input', function() {
  if (lockChk.checked && files.length) {
    var r = files[0].img.naturalWidth / files[0].img.naturalHeight;
    wIn.value = Math.round(parseInt(hIn.value) * r) || '';
  }
  presetSel.value = '';
});
presetSel.addEventListener('change', function() {
  if (!presetSel.value) return;
  var parts = presetSel.value.split(',');
  var pw = parseInt(parts[0]), ph = parseInt(parts[1]);
  if (lockChk.checked && files.length) {
    var r = files[0].img.naturalWidth / files[0].img.naturalHeight;
    if (r >= pw/ph) { wIn.value = pw; hIn.value = Math.round(pw/r); }
    else { hIn.value = ph; wIn.value = Math.round(ph*r); }
  } else { wIn.value = pw; hIn.value = ph; }
});

qualRange.addEventListener('input', function() {
  qualNum.value = qualRange.value;
});
qualNum.addEventListener('input', function() {
  var v = Math.min(100, Math.max(1, parseInt(qualNum.value) || 1));
  qualRange.value = v;
  qualNum.value = v;
});
qualNum.addEventListener('blur', function() {
  var v = Math.min(100, Math.max(1, parseInt(qualNum.value) || 1));
  qualRange.value = v;
  qualNum.value = v;
});
fmtSel.addEventListener('change', function() {
  qualWrap.style.display = fmtSel.value === 'image/png' ? 'none' : 'block';
});

// PNG DPI inject
function injectPngDpi(bytes, dpiVal) {
  var ppm = Math.round(dpiVal / 0.0254);
  var table = new Int32Array(256);
  for (var i = 0; i < 256; i++) {
    var c = i;
    for (var j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    table[i] = c;
  }
  function crc32(buf) {
    var crc = -1;
    for (var i = 0; i < buf.length; i++) crc = table[(crc ^ buf[i]) & 0xff] ^ (crc >>> 8);
    return (crc ^ -1) >>> 0;
  }
  var ct = new Uint8Array([112,72,89,115]);
  var cd = new Uint8Array(9);
  var dv = new DataView(cd.buffer);
  dv.setUint32(0, ppm); dv.setUint32(4, ppm); cd[8] = 1;
  var cb = new Uint8Array(13); cb.set(ct); cb.set(cd, 4);
  var cv2 = crc32(cb);
  var chunk = new Uint8Array(17);
  var chv = new DataView(chunk.buffer);
  chv.setUint32(0, 9); chunk.set(ct, 4); chunk.set(cd, 8); chv.setUint32(13, cv2);
  var pos = 8;
  while (pos < bytes.length - 4) {
    var len = new DataView(bytes.buffer, bytes.byteOffset + pos).getUint32(0);
    var type = String.fromCharCode(bytes[pos+4],bytes[pos+5],bytes[pos+6],bytes[pos+7]);
    if (type === 'IDAT' || type === 'pHYs') break;
    pos += 12 + len;
  }
  if (pos >= bytes.length) pos = 8;
  var out = new Uint8Array(bytes.length + 17);
  out.set(bytes.slice(0, pos));
  out.set(chunk, pos);
  out.set(bytes.slice(pos), pos + 17);
  return out;
}

// JPEG DPI inject
function injectJpegDpi(bytes, dpiVal) {
  var app0 = new Uint8Array([0xFF,0xE0,0x00,0x10,0x4A,0x46,0x49,0x46,0x00,0x01,0x01,0x01,(dpiVal>>8)&0xFF,dpiVal&0xFF,(dpiVal>>8)&0xFF,dpiVal&0xFF,0x00,0x00]);
  var start = 2;
  if (bytes[2] === 0xFF && bytes[3] === 0xE0) { start = 2 + 2 + ((bytes[4]<<8)|bytes[5]); }
  var out = new Uint8Array(2 + app0.length + (bytes.length - start));
  out[0] = 0xFF; out[1] = 0xD8;
  out.set(app0, 2);
  out.set(bytes.slice(start), 2 + app0.length);
  return out;
}

function dataUrlToBytes(dataUrl) {
  var b64 = dataUrl.split(',')[1];
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

function download(blob, name) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function processEntry(entry, format, q, dpiVal, suffix, ext) {
  var w, h;
  if (mode === 'longfit') {
    var le = parseInt(longIn.value);
    var ow = entry.img.naturalWidth, oh = entry.img.naturalHeight;
    if (ow >= oh) { w = le; h = Math.round(le * oh / ow); }
    else { h = le; w = Math.round(le * ow / oh); }
  } else {
    w = parseInt(wIn.value); h = parseInt(hIn.value);
  }
  cv.width = w; cv.height = h;
  ctx.clearRect(0, 0, w, h);
  ctx.drawImage(entry.img, 0, 0, w, h);
  var dataUrl = cv.toDataURL(format, q);
  var bytes = dataUrlToBytes(dataUrl);
  if (format === 'image/png') bytes = injectPngDpi(bytes, dpiVal);
  else if (format === 'image/jpeg') bytes = injectJpegDpi(bytes, dpiVal);
  var base = entry.file.name.replace(/\.[^.]+$/, '');
  return { bytes: bytes, name: base + suffix + '.' + ext, format: format };
}

saveBtn.addEventListener('click', function() {
  if (!files.length) return;
  var q = parseInt(qualNum.value) / 100;
  var format = fmtSel.value;
  var extMap = {'image/jpeg':'jpg','image/png':'png','image/webp':'webp'};
  var ext = extMap[format];
  var suffix = suffixIn.value || '';
  var dpiVal = parseInt(dpiIn.value) || 72;
  var useZip = zipChk.checked && files.length > 1;

  if (mode === 'fixed') {
    if (!parseInt(wIn.value) || !parseInt(hIn.value)) { alert('가로/세로 크기를 입력해 주세요.'); return; }
  } else {
    if (!parseInt(longIn.value)) { alert('긴 축 길이를 입력해 주세요.'); return; }
  }

  saveBtn.disabled = true;
  pbar.classList.add('show');
  pfill.style.width = '0%';

  if (useZip) {
    var zip = new JSZip();
    var i = 0;
    function nextZip() {
      if (i >= files.length) {
        zip.generateAsync({type:'blob'}).then(function(blob) {
          download(blob, 'images_resized.zip');
          saveBtn.disabled = false;
        });
        return;
      }
      var entry = files[i];
      entry.statusEl.textContent = '처리 중…';
      entry.statusEl.className = 'fstatus processing';
      try {
        var result = processEntry(entry, format, q, dpiVal, suffix, ext);
        zip.file(result.name, result.bytes);
        entry.statusEl.textContent = '완료';
        entry.statusEl.className = 'fstatus done';
      } catch(e) {
        entry.statusEl.textContent = '오류';
        entry.statusEl.className = 'fstatus error';
      }
      pfill.style.width = ((i+1)/files.length*100) + '%';
      i++;
      sleep(100).then(nextZip);
    }
    nextZip();
  } else {
    var i = 0;
    function next() {
      if (i >= files.length) { saveBtn.disabled = false; return; }
      var entry = files[i];
      entry.statusEl.textContent = '처리 중…';
      entry.statusEl.className = 'fstatus processing';
      try {
        var result = processEntry(entry, format, q, dpiVal, suffix, ext);
        var blob = new Blob([result.bytes], {type: result.format});
        download(blob, result.name);
        entry.statusEl.textContent = '완료';
        entry.statusEl.className = 'fstatus done';
      } catch(e) {
        console.error(e);
        entry.statusEl.textContent = '오류';
        entry.statusEl.className = 'fstatus error';
      }
      pfill.style.width = ((i+1)/files.length*100) + '%';
      i++;
      sleep(200).then(next);
    }
    next();
  }
});
</script>
