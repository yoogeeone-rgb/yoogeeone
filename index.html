<style>
:root {
  --bg: #ffffff;
  --fg: #0a0a0a;
  --gray: #6b6b6b;
  --gray2: #aaaaaa;
  --line: #e8e8e8;
  --sans: 'DM Sans', 'Noto Sans KR', sans-serif;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  max-width: 1440px;
  margin: 0 auto;
  overflow-x: hidden;
}

/* ── PAGE TRANSITIONS ── */
.page { display: none; opacity: 0; }
.page.active { display: block; animation: pageIn 0.5s var(--ease) forwards; }
@keyframes pageIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* ── GLOBAL NAV ── */
.site-nav {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 40px;
  height: 88px;
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
}
.nav-left { display: flex; gap: 28px; align-items: center; }
.nav-center { display: flex; justify-content: center; }
.nav-right { display: flex; gap: 20px; align-items: center; justify-content: flex-end; }

.nav-link {
  font-size: 17px;
  font-weight: 300;
  letter-spacing: 0.04em;
  color: var(--gray);
  text-decoration: none;
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--sans);
  padding: 0;
  transition: color 0.2s;
  position: relative;
}
.nav-link:hover { color: var(--fg); }
.nav-link.active {
  color: var(--fg);
}
.nav-link.active::after {
  content: '';
  position: absolute;
  bottom: -24px;
  left: 0; right: 0;
  height: 1px;
  background: var(--fg);
}

.nav-logo { cursor: pointer; display: flex; align-items: center; }
.nav-logo img { height: 78px; display: block; }

.nav-ig {
  display: flex;
  align-items: center;
  color: var(--gray);
  transition: color 0.2s;
}
.nav-ig:hover { color: var(--fg); }
.nav-ig svg { width: 17px; height: 17px; }

.lang-toggle { display: flex; align-items: center; gap: 4px; }
.lang-btn {
  background: none; border: none;
  font-family: var(--sans); font-size: 12px; font-weight: 300;
  letter-spacing: 0.08em; color: var(--gray2);
  cursor: pointer; padding: 0; transition: color 0.2s;
}
.lang-btn:hover { color: var(--fg); }
.lang-btn.active { color: var(--fg); font-weight: 400; }
.lang-divider { font-size: 11px; color: var(--gray2); }

/* ── WORK PAGE ── */
/* ── WORK TOOLBAR ── */
.work-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  height: 44px;
  margin-top: 0;
}
.filter-group { display: flex; gap: 0; align-items: center; }
.filter-btn {
  background: none;
  border: none;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.08em;
  color: var(--gray);
  cursor: pointer;
  padding: 0 14px 0 0;
  transition: color 0.2s;
  white-space: nowrap;
}
.filter-btn:first-child { padding-left: 0; }
.filter-btn:hover { color: var(--fg); }
.filter-btn.active { color: var(--fg); font-weight: 400; }

.view-group { display: flex; gap: 4px; align-items: center; }
.work-grid-wrap {
  margin: 20px 40px 0;
  display: flex;
  justify-content: flex-start;
}
.view-btn {
  background: none;
  border: none;
  color: var(--gray2);
  cursor: pointer;
  padding: 5px 6px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.view-btn svg { width: 13px; height: 13px; display: block; }
.view-btn:hover { color: var(--fg); }
.view-btn.active { color: var(--fg); background: var(--line); }

/* ── GRIDS ── */
.work-grid {
  display: grid;
  gap: 5px;
  background: var(--bg);
  margin: 12px 40px 0;
}
.work-grid.view-grid { grid-template-columns: repeat(4, 1fr); }
.work-grid.view-list { grid-template-columns: repeat(2, 1fr); }
.work-grid.view-feed { grid-template-columns: repeat(3, 1fr); }
.work-grid.view-full { grid-template-columns: repeat(1, 1fr); }

.work-item {
  aspect-ratio: 3/4;
  overflow: hidden;
  background: #ebebeb;
  cursor: pointer;
  position: relative;
}
.work-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.7s var(--ease), filter 0.3s;
  filter: saturate(0.9);
}
.work-item:hover img { transform: scale(1.05); filter: saturate(1); }

/* list view 는 좀 더 가로로 */
.view-list .work-item { aspect-ratio: 3/4; }
.view-feed .work-item { aspect-ratio: 3/4; }
.view-full .work-item { aspect-ratio: 3/4; }

.work-load-more {
  display: flex;
  justify-content: center;
  padding: 48px 0 80px;
}
.work-load-more button {
  background: none;
  border: 1px solid var(--line);
  color: var(--gray);
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.14em;
  padding: 12px 40px;
  cursor: pointer;
  transition: all 0.2s;
}
.work-load-more button:hover { border-color: var(--fg); color: var(--fg); }

/* ── SERVICE ── */
.service-sub-nav {
  display: flex;
  gap: 0;
  padding: 0 40px;
  border-bottom: 1px solid var(--line);
  height: 44px;
  align-items: center;
}
.service-tab {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.06em;
  color: var(--gray);
  cursor: pointer;
  padding: 0 0;
  margin-right: 28px;
  height: 100%;
  transition: color 0.2s;
  position: relative;
  top: 1px;
}
.service-tab:hover { color: var(--fg); }
.service-tab.active { color: var(--fg); border-bottom-color: var(--fg); }

.service-panel { display: none; }
.service-panel.active { display: block; }

.service-hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--line);
  margin: 40px 40px 0;
}
.service-hero-img {
  aspect-ratio: 4/5;
  overflow: hidden;
  background: #ebebeb;
}
.service-hero-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: saturate(0.9);
  transition: transform 0.7s var(--ease);
}
.service-hero-img:hover img { transform: scale(1.03); }

.service-hero-text {
  padding: 56px 48px;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}
.service-eyebrow {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gray2);
  margin-bottom: 20px;
}
.service-title {
  font-family: var(--serif);
  font-size: clamp(36px, 4vw, 58px);
  font-weight: 400;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--fg);
  margin-bottom: 32px;
}
.service-desc {
  font-size: 14px;
  line-height: 2;
  color: var(--gray);
  word-break: keep-all;
  flex: 1;
  margin-bottom: 32px;
}
.service-select-title {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.2em;
  color: var(--gray2);
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 20px;
}
.service-select-list { list-style: none; display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px; }
.service-select-list li {
  font-size: 13px;
  color: var(--gray);
  line-height: 1.75;
  padding-left: 18px;
  position: relative;
  word-break: keep-all;
}
.service-select-list li::before { content: '—'; position: absolute; left: 0; color: var(--gray2); font-size: 9px; top: 4px; }
.service-book-btn {
  display: block;
  text-align: center;
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--bg);
  background: var(--fg);
  padding: 15px 0;
  cursor: pointer;
  transition: background 0.2s;
  text-decoration: none;
  border: none;
}
.service-book-btn:hover { background: var(--gray); }

/* portrait cards */
.portrait-compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--line);
  margin: 1px 40px 0;
}
.portrait-card {
  background: var(--bg);
  padding: 52px 48px;
  display: flex;
  flex-direction: column;
}
.portrait-card-premium { background: #f0ede6; }
.portrait-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.portrait-eyebrow { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gray2); }
.portrait-badge { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bg); background: var(--fg); padding: 4px 10px; }
.portrait-title {
  font-family: var(--serif);
  font-size: clamp(40px, 4vw, 56px);
  font-weight: 400;
  color: var(--fg);
  line-height: 0.95;
  letter-spacing: -0.02em;
  margin-bottom: 20px;
}
.portrait-desc { font-size: 14px; line-height: 1.9; color: var(--gray); word-break: keep-all; margin-bottom: 32px; flex: 1; }
.portrait-divider { border: none; border-top: 1px solid var(--line); margin-bottom: 24px; }
.portrait-list { list-style: none; display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px; }
.portrait-list li { font-size: 13px; color: var(--gray); line-height: 1.75; padding-left: 18px; position: relative; word-break: keep-all; }
.portrait-list li::before { content: '—'; position: absolute; left: 0; color: var(--gray2); font-size: 9px; top: 4px; }
.portrait-sub { font-size: 12px; color: var(--gray); display: block; opacity: 0.7; margin-top: 2px; }
.portrait-btn {
  display: block;
  text-align: center;
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg);
  border: 1px solid var(--line);
  padding: 14px 0;
  background: none;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  text-decoration: none;
  margin-top: auto;
}
.portrait-btn:hover { border-color: var(--fg); }
.portrait-btn-filled { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.portrait-btn-filled:hover { background: var(--gray); border-color: var(--gray); }

/* gallery grid (service) */
.portrait-gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--line);
  margin: 1px 40px 0;
}
.portrait-gallery-item {
  aspect-ratio: 3/4;
  overflow: hidden;
  background: #ebebeb;
  cursor: pointer;
}
.portrait-gallery-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: saturate(0.9);
  transition: transform 0.7s var(--ease), filter 0.3s;
}
.portrait-gallery-item:hover img { transform: scale(1.05); filter: saturate(1); }

/* ── CONTACT ── */
.contact-body { padding: 56px 40px 0; }
#map { width: 100%; height: 440px; background: #e0ddd8; margin-bottom: 40px; }
.contact-list { list-style: none; border-top: 1px solid var(--line); }
.contact-list li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 0;
  border-bottom: 1px solid var(--line);
}
.contact-label { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gray2); }
.contact-val { font-size: 14px; color: var(--fg); text-decoration: none; transition: color 0.2s; word-break: keep-all; text-align: right; }
.contact-val:hover { color: var(--gray); }

.studio-section { padding: 60px 40px 100px; border-top: 1px solid var(--line); margin-top: 60px; }
.studio-title {
  font-family: var(--serif);
  font-size: clamp(36px, 4vw, 52px);
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--fg);
  margin-bottom: 24px;
}
.studio-desc { font-size: 14px; line-height: 2; color: var(--gray); word-break: keep-all; margin-bottom: 48px; max-width: 640px; }
.studio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line); }
.studio-item { aspect-ratio: 3/2; overflow: hidden; background: #e8e6e0; }
.studio-item img { width: 100%; height: 100%; object-fit: cover; display: block; filter: saturate(0.9); transition: transform 0.7s var(--ease); }
.studio-item:hover img { transform: scale(1.04); }

/* ── GUIDE ── */
.guide-body { padding: 56px 40px 100px; max-width: 760px; }
.guide-section { margin-bottom: 48px; padding-bottom: 48px; border-bottom: 1px solid var(--line); }
.guide-section:last-child { border-bottom: none; }
.guide-section-title { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray2); margin-bottom: 24px; }
.guide-table { width: 100%; border-collapse: collapse; }
.guide-table tr { border-bottom: 1px solid var(--line); }
.guide-table tr:last-child { border-bottom: none; }
.guide-table td { padding: 16px 0; font-size: 14px; font-weight: 300; line-height: 1.7; vertical-align: top; word-break: keep-all; color: var(--gray); }
.guide-table td:first-child { width: 120px; color: var(--fg); font-size: 12px; padding-right: 32px; opacity: 0.5; }

/* ── LIGHTBOX ── */
.lightbox {
  position: fixed; inset: 0;
  background: rgba(255,255,255,0.97);
  z-index: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.lightbox.open { opacity: 1; pointer-events: all; }
.lb-backdrop { position: absolute; inset: 0; cursor: pointer; z-index: 0; }
.lb-track {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  width: 100%; flex: 1; overflow: hidden;
}
.lb-img-wrap {
  display: flex;
  transition: transform 0.35s var(--ease);
  will-change: transform;
  height: 100%;
  align-items: center;
}
.lb-img-wrap img {
  max-width: 82vw; max-height: 78vh;
  object-fit: contain;
  flex-shrink: 0; width: 82vw;
  user-select: none; -webkit-user-drag: none;
}
.lb-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  z-index: 2; background: none; border: none;
  color: rgba(17,17,16,0.25); cursor: pointer;
  font-size: 22px; padding: 20px 28px; transition: color 0.2s; line-height: 1;
}
.lb-arrow:hover { color: var(--fg); }
.lb-prev { left: 0; } .lb-next { right: 0; }
.lb-close {
  position: absolute; top: 24px; right: 36px; z-index: 3;
  background: none; border: none;
  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(17,17,16,0.3); cursor: pointer; transition: color 0.2s;
  font-family: var(--sans);
}
.lb-close:hover { color: var(--fg); }
.lb-nav {
  position: relative; z-index: 1;
  display: flex; gap: 7px; align-items: center;
  padding: 20px 0 28px; flex-wrap: wrap;
  justify-content: center; max-width: 80vw;
}
.lb-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: transparent; border: 1px solid rgba(17,17,16,0.25);
  cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.lb-dot.active { background: var(--fg); border-color: var(--fg); transform: scale(1.3); }
.lb-counter {
  position: absolute; top: 28px; left: 36px; z-index: 3;
  font-size: 11px; letter-spacing: 0.14em;
  color: rgba(17,17,16,0.3); font-family: var(--sans);
}

/* ── FOOTER ── */
footer { border-top: 1px solid var(--line); padding: 20px 40px; margin-top: 80px; }
.footer-info { font-size: 11px; color: var(--gray2); line-height: 1.8; word-break: keep-all; }

/* ── KAKAO FLOAT ── */
.kakao-float {
  position: fixed; bottom: 32px; right: 32px; z-index: 400;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; text-decoration: none;
  transition: transform 0.3s var(--ease);
}
.kakao-float:hover { transform: translateY(-4px); }
.kakao-float-icon {
  width: 48px; height: 48px; background: #FEE500;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.kakao-float-icon svg { width: 24px; height: 24px; }
.kakao-float-label { font-size: 10px; color: var(--gray); letter-spacing: 0.06em; opacity: 0.7; transition: opacity 0.2s; }
.kakao-float:hover .kakao-float-label { opacity: 1; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .site-nav {
    padding: 0 20px;
    grid-template-columns: 1fr;
    grid-template-rows: auto auto;
    height: auto;
    padding-top: 16px;
    gap: 0;
  }
  .nav-center { order: -1; justify-content: center; padding-bottom: 14px; border-bottom: 1px solid var(--line); }
  .nav-left { order: 0; padding: 12px 0; gap: 20px; }
  .nav-right { position: absolute; top: 20px; right: 20px; }
  .nav-link.active::after { bottom: -13px; }
  .nav-link { font-size: 15px; }
  .nav-logo img { height: 58px; }

  .work-toolbar { padding: 0 20px; overflow-x: auto; gap: 12px; }
  .filter-group { gap: 0; flex-shrink: 0; }
  .filter-btn { font-size: 12px; padding-right: 12px; }
  .view-group { flex-shrink: 0; }
  .view-btn { padding: 4px 5px; }

  .work-grid-wrap { margin: 8px 20px 0; }
  .work-grid { margin: 0 20px; }
  .work-grid.view-grid { grid-template-columns: repeat(2, 1fr); }
  .work-grid.view-list { grid-template-columns: repeat(1, 1fr); }
  .work-grid.view-feed { grid-template-columns: repeat(2, 1fr); }
  .work-grid.view-full { grid-template-columns: repeat(1, 1fr); }

  .service-sub-nav { padding: 0 20px; }
  .service-hero { grid-template-columns: 1fr; margin: 20px 20px 0; }
  .service-hero-img { aspect-ratio: 3/4; }
  .service-hero-text { padding: 36px 24px; }
  .portrait-compare { grid-template-columns: 1fr; margin: 1px 20px 0; }
  .portrait-card { padding: 36px 24px; }
  .portrait-gallery { grid-template-columns: repeat(2, 1fr); margin: 1px 20px 0; }

  .contact-body { padding: 36px 20px 0; }
  #map { height: 300px; }
  .studio-section { padding: 40px 20px 60px; margin-top: 40px; }
  .studio-grid { grid-template-columns: repeat(2, 1fr); }

  .guide-body { padding: 36px 20px 60px; max-width: 100%; }
  .guide-table td:first-child { width: 90px; }

  footer { padding: 16px 20px; margin-top: 48px; }
  .kakao-float { bottom: 20px; right: 16px; }
}

/* ── PAGE ── */
var visitedPages = new Set();

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.toggle('active', p.id === 'page-' + id);
  });

  var pageEl = document.getElementById('page-' + id);
  if (visitedPages.has(id)) {
    pageEl.style.animation = 'none';
    pageEl.style.opacity = '1';
  } else {
    pageEl.style.animation = '';
    pageEl.style.opacity = '';
    visitedPages.add(id);
  }

  // nav active
  document.querySelectorAll('.nav-link').forEach(a => {
    a.classList.toggle('active', a.id === 'nav-' + id);
  });

  window.location.hash = id;
  window.scrollTo(0, 0);
  if (id === 'contact') setTimeout(initMap, 200);
  if (id === 'work') { setTimeout(function() { filterWork('all'); initHero(); }, 0); }
}

// 초기 진입
(function() {
  var hash = window.location.hash.replace('#', '');
  var valid = ['work','service','contact','guide'];
  if (hash && valid.indexOf(hash) !== -1) showPage(hash);
  else showPage('work');
  setTimeout(initHero, 100);
})();

/* ── WORK FILTER & VIEW ── */
var WORK_PAGE_SIZE = 24;
var workCurrentCat = 'all';
var workCurrentView = 'grid';
var workShuffled = [];

(function() {
  var grid = document.getElementById('work-grid');
  if (!grid) return;
  var items = Array.from(grid.querySelectorAll('.work-item'));

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  var editorial = items.filter(i => i.dataset.cat === 'editorial');
  var others = items.filter(i => i.dataset.cat !== 'editorial');
  shuffle(editorial); shuffle(others);

  var weighted = [], eIdx = 0, oIdx = 0;
  while (eIdx < editorial.length || oIdx < others.length) {
    var block = [];
    for (var e = 0; e < 12 && eIdx < editorial.length; e++) block.push(editorial[eIdx++]);
    for (var o = 0; o < 6 && oIdx < others.length; o++) block.push(others[oIdx++]);
    shuffle(block);
    weighted = weighted.concat(block);
  }
  workShuffled = weighted;
  items.forEach(item => item.style.display = 'none');
  workShuffled.slice(0, WORK_PAGE_SIZE).forEach(item => item.style.display = '');
  updateCount();
})();

function updateCount() {
  var filtered = workCurrentCat === 'all' ? workShuffled : workShuffled.filter(i => i.dataset.cat === workCurrentCat);
  var shown = filtered.filter(i => i.style.display !== 'none').length;
  var el = document.getElementById('work-count');
  if (el) el.textContent = 'Selected Works(' + shown + ')';
  var lb = document.getElementById('work-load-more');
  if (lb) lb.style.display = shown < filtered.length ? 'flex' : 'none';
}

function filterWork(cat) {
  workCurrentCat = cat;
  workShuffled.forEach(item => item.style.display = 'none');
  var filtered = workShuffled.filter(item => cat === 'all' || item.dataset.cat === cat);
  filtered.slice(0, WORK_PAGE_SIZE).forEach(item => item.style.display = '');
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.id === 'fb-' + cat);
  });
  updateCount();
}

function loadMoreWork() {
  var filtered = workShuffled.filter(item => workCurrentCat === 'all' || item.dataset.cat === workCurrentCat);
  var shown = filtered.filter(item => item.style.display !== 'none').length;
  filtered.slice(shown, shown + WORK_PAGE_SIZE).forEach(item => item.style.display = '');
  updateCount();
}

function setView(v) {
  workCurrentView = v;
  var grid = document.getElementById('work-grid');
  grid.className = 'work-grid view-' + v;
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.classList.toggle('active', btn.id === 'vb-' + v);
  });
}

/* ── SERVICE ── */
function showServiceTop(id) {
  document.getElementById('sp-fashion').classList.toggle('active', id === 'fashion');
  document.getElementById('sp-essential').classList.toggle('active', id === 'portrait');
  document.getElementById('sf-fashion').classList.toggle('active', id === 'fashion');
  document.getElementById('sf-portrait').classList.toggle('active', id === 'portrait');
}

/* ── LIGHTBOX ── */
var lbImages = [], lbIndex = 0;

function lbRender() {
  var wrap = document.getElementById('lb-img-wrap');
  var nav = document.getElementById('lb-nav');
  wrap.innerHTML = '';
  lbImages.forEach(function(src) {
    var img = document.createElement('img');
    img.src = src; img.draggable = false;
    wrap.appendChild(img);
  });
  wrap.style.transform = 'translateX(-' + (lbIndex * 82) + 'vw)';
  nav.innerHTML = '';
  var maxDots = Math.min(lbImages.length, 40);
  for (var i = 0; i < maxDots; i++) {
    var dot = document.createElement('button');
    dot.className = 'lb-dot' + (i === lbIndex ? ' active' : '');
    dot.setAttribute('data-i', i);
    (function(idx) {
      dot.addEventListener('click', function(e) { e.stopPropagation(); moveLight(idx - lbIndex); });
    })(i);
    nav.appendChild(dot);
  }
  document.getElementById('lb-counter').textContent = (lbIndex + 1) + ' / ' + lbImages.length;
}

function openLightbox(src, contextEl) {
  var scope = contextEl
    ? (contextEl.closest('.service-panel') || contextEl.closest('.page.active'))
    : document.querySelector('.page.active');
  var imgs = scope ? scope.querySelectorAll('.work-item img, .portrait-gallery-item img') : [];
  lbImages = Array.from(imgs).filter(function(img) { return img.offsetParent !== null; }).map(function(img) { return img.src; });
  lbIndex = lbImages.indexOf(src);
  if (lbIndex === -1) lbIndex = 0;
  lbRender();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function moveLight(dir) {
  lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
  document.getElementById('lb-img-wrap').style.transform = 'translateX(-' + (lbIndex * 82) + 'vw)';
  document.querySelectorAll('.lb-dot').forEach(function(d, i) { d.classList.toggle('active', i === lbIndex); });
  document.getElementById('lb-counter').textContent = (lbIndex + 1) + ' / ' + lbImages.length;
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('lb-backdrop').addEventListener('click', closeLightbox);
document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', function(e) { e.stopPropagation(); moveLight(-1); });
document.getElementById('lb-next').addEventListener('click', function(e) { e.stopPropagation(); moveLight(1); });

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') moveLight(-1);
  if (e.key === 'ArrowRight') moveLight(1);
});

(function() {
  var track = document.getElementById('lb-track');
  var startX = 0, startY = 0, isDragging = false, locked = false;
  track.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; startY = e.touches[0].clientY; isDragging = true; locked = false; }, { passive: true });
  track.addEventListener('touchmove', function(e) {
    if (!isDragging) return;
    var dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
    if (!locked) { if (Math.abs(dx) > Math.abs(dy) + 5) locked = 'h'; else if (Math.abs(dy) > Math.abs(dx) + 5) locked = 'v'; }
    if (locked === 'h') e.preventDefault();
  }, { passive: false });
  track.addEventListener('touchend', function(e) {
    if (!isDragging) return; isDragging = false;
    var dx = e.changedTouches[0].clientX - startX;
    if (locked === 'h' && Math.abs(dx) > 40) moveLight(dx < 0 ? 1 : -1);
  }, { passive: true });
})();




/* ── HERO ── */
var heroImages = [];
var heroIndex = 0;

function initHero() {
  var items = document.querySelectorAll('.work-item[data-cat="editorial"] img');
  var srcs = Array.from(items).map(function(img) { return img.src; });
  for (var i = srcs.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = srcs[i]; srcs[i] = srcs[j]; srcs[j] = t;
  }
  heroImages = srcs;
  heroIndex = 0;
  var img = document.getElementById('hero-img');
  if (img && heroImages.length) {
    img.src = heroImages[0];
    updateHeroCounter();
  }
}

function heroNext() {
  if (!heroImages.length) return;
  heroIndex = (heroIndex + 1) % heroImages.length;
  var img = document.getElementById('hero-img');
  img.classList.add('fade');
  setTimeout(function() {
    img.src = heroImages[heroIndex];
    img.classList.remove('fade');
    updateHeroCounter();
  }, 250);
}

function updateHeroCounter() {
  var el = document.getElementById('hero-counter');
  if (el) el.textContent = (heroIndex + 1) + ' / ' + heroImages.length;
}

/* ── LANGUAGE TOGGLE ── */
var currentLang = 'ko';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('#lang-kor, #lang-eng').forEach(btn => {
    btn.classList.toggle('active', btn.id === 'lang-' + (lang === 'ko' ? 'kor' : 'eng'));
  });
  document.querySelectorAll('[data-ko]').forEach(el => {
    var text = lang === 'ko' ? el.getAttribute('data-ko') : el.getAttribute('data-en');
    if (text) el.innerHTML = text;
  });
}

/* ── MAP ── */
var mapInited = false;
function initMap() {
  if (mapInited) return;
  var mapEl = document.getElementById('map');
  if (!mapEl || typeof naver === 'undefined') { setTimeout(initMap, 500); return; }
  mapInited = true;
  var center = new naver.maps.LatLng(37.498428, 127.127065);
  var map = new naver.maps.Map(mapEl, { center: center, zoom: 17 });
  var marker = new naver.maps.Marker({ position: center, map: map });
  var info = new naver.maps.InfoWindow({ content: '<div style="padding:8px 12px;font-size:13px;font-weight:500;color:#111;">석양대로</div>' });
  info.open(map, marker);
}
window.addEventListener('load', function() {
  if (document.getElementById('page-contact').classList.contains('active')) initMap();
});
</script>
